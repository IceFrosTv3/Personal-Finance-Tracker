<section class="income-and-expenses container p-0">
    <header class="page-title">Income and Expenses</header>

    <div class="actions-group">
        <a href="/transactions/create" class="btn btn-success" data-action="create">
            Create income
        </a>
        <a href="/transactions/create" class="btn btn-danger" data-action="create">
            Create expense
        </a>
    </div>

    <div id="period" class="period">
        <button class="period__button btn btn-secondary" data-period="today">Today</button>
        <button class="period__button btn btn-outline-secondary" data-period="week">Week</button>
        <button class="period__button btn btn-outline-secondary" data-period="month">Month</button>
        <button class="period__button btn btn-outline-secondary" data-period="year">Year</button>
        <button class="period__button btn btn-outline-secondary" data-period="all">All</button>
        <button class="period__button btn btn-outline-secondary" data-period="all">Interval</button>
        <div class="period__custom">
            <span>from</span>
            <a class="fromDate link-secondary" id="fromDate" type="button">
                <span id="fromDateText">Date</span>
            </a>

            <span>to</span>
            <a class="toDate link-secondary" id="toDate" type="button">
                <span id="toDateText">Date</span>
            </a>
        </div>
    </div>

    <table class="table table-hover">
        <thead>
        <tr class="table__header">
            <th scope="col">#</th>
            <th scope="col">Type</th>
            <th scope="col">Category</th>
            <th scope="col">Amount</th>
            <th scope="col">Date</th>
            <th scope="col">Note</th>
            <th scope="col" style="width: 60px"></th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <th scope="row">1</th>
            <td class="text-success">income</td>
            <td>salary</td>
            <td>$500</td>
            <td>11/09/2022</td>
            <td></td>
            <td class="d-flex gap-2">
                <button type="button" class="btn p-0 border-0"
                        data-bs-target="#delete-category-modal" data-bs-toggle="modal">
                    <i class="bi bi-trash"></i>
                </button>
                <a href="transactions/edit" class="btn p-0 border-0">
                    <i class="bi bi-pencil"></i>
                </a>
            </td>
        </tr>
        <tr>
            <th scope="row">2</th>
            <td class="text-danger">expense</td>
            <td>Health</td>
            <td>$2500</td>
            <td>12/09/2022</td>
            <td></td>
            <td class="d-flex gap-2">
                <button type="button" class="btn p-0 border-0"
                        data-bs-target="#delete-category-modal" data-bs-toggle="modal">
                    <i class="bi bi-trash"></i>
                </button>
                <a href="transactions/edit" class="btn p-0 border-0">
                    <i class="bi bi-pencil"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="modal fade" id="delete-category-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                    <span class="modal-text">
                        Are you sure you want to delete this operation?
                    </span>
                <div>
                    <button id="confirm-delete-category" type="button" class="btn btn-success me-2"
                            data-bs-target="#confirm-delete-modal" data-bs-toggle="modal">
                        Yes, delete
                    </button>
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">
                        Don't delete
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="confirm-delete-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered justify-content-center">
            <div class="modal-content">
                    <span id="result-text" class="modal-text">
                            Category has been deleted
                    </span>
                <div>
                    <button id="result-button" type="button" class="btn btn-success" data-bs-dismiss="modal">
                        Ok
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="auth">
    <div class="container">
        <div class="auth__content">
            <a href="/login"
               class="auth__logo text-decoration-none">
                <img
                        class="bi pe-none"
                        src="/images/logo.svg"
                        alt="Logo image"
                        width="100"
                        height="40"
                        loading="lazy"
                />
            </a>
            <h1 class="page-title">Sign In</h1>
            <form class="auth__inputs" novalidate>
                <div class="input-group">
                    <span class="input-group-text text-secondary" id="email-ico">
                        <i class="bi bi-envelope-open"></i>
                    </span>
                    <input type="email" class="form-control" name="email"
                           placeholder="E-mail" aria-label="E-mail"
                           aria-describedby="email-ico" data-validate="email"
                           data-label="Please enter email" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="input-group">
                    <span class="input-group-text text-secondary" id="password-ico">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" name="password"
                           placeholder="Password" aria-label="Password"
                           aria-describedby="password-ico" data-validate="password"
                           data-label="Please enter password" pattern=".{8,}" required>
                    <div class="invalid-feedback"></div>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="checkDefault" name="rememberMe">
                    <label class="form-check-label" for="checkDefault">
                        Remember me?
                    </label>
                </div>
                <button class="btn btn-primary auth__button">Sign In</button>
            </form>
            <p>Don't have an account? <a href="/register">Sign Up</a></p>
        </div>
        <div class="toast-container position-fixed bottom-0 end-0 p-3" data-bs-autohide="true" data-bs-delay="5000">
            <div class="toast rounded-3 shadow align-items-center text-white bg-danger border-0" role="alert"
                 aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <strong class="me-auto">Error</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Error message
                </div>
            </div>
        </div>
    </div>
</div>

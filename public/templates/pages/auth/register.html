<div class="auth">
    <div class="container">
        <div class="auth__content">
            <a href="/register"
               class="auth__logo text-decoration-none">
                <img
                        class="bi pe-none"
                        src="/images/logo.svg"
                        alt="Logo image"
                        width="100"
                        height="40"
                        loading="lazy"
                />
            </a>
            <h1 class="page-title">Sign Up</h1>
            <form class="auth__inputs" novalidate>
                <div class="input-group ">
                    <span class="input-group-text text-secondary" id="name-ico">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Name" aria-label="Name"
                           aria-describedby="name-ico" data-validate="name"
                           data-label="Please enter your name" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="input-group ">
                    <span class="input-group-text text-secondary" id="lastname-ico">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Lastname" aria-label="Lastname"
                           aria-describedby="lastname-ico" data-validate="lastname"
                           data-label="Please enter your last name" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="input-group">
                    <span class="input-group-text text-secondary" id="email-ico">
                        <i class="bi bi-envelope-open"></i>
                    </span>
                    <input type="email" class="form-control" placeholder="E-mail" aria-label="E-mail"
                           aria-describedby="email-ico" data-validate="email"
                           data-label="Please enter email" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="input-group">
                    <span class="input-group-text text-secondary" id="password-ico">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Password"
                           aria-label="Password" aria-describedby="password-ico"
                           data-validate="password" pattern=".{8,}"
                           data-label="Please enter password" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="input-group ">
                    <span class="input-group-text text-secondary" id="repeat-password-ico">
                      <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" placeholder="Repeat Password"
                           aria-label="Repeat Password"
                           aria-describedby="repeatPassword-ico"
                           data-validate="repeatPassword" pattern=".{8,}"
                           data-label="Please repeat password" required>
                    <div class="invalid-feedback"></div>
                </div>
                <button type="submit" class="btn btn-primary auth__button">Sign Up</button>
            </form>
            <p>Registered? <a href="/login">Sign In</a></p>
        </div>
    </div>
</div>
